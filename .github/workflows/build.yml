name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --manifest-path src-tauri/Cargo.toml

      - name: Build NSIS installer
        run: |
          $version = git describe --tags --abbrev=0 2>$null
          if (-not $version) { $version = "0.1.0" }
          $version = $version -replace '^v', ''
          makensis /DVERSION=$version installer/setup.nsi

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: software-manager-portable
          path: src-tauri/target/release/software-manager.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: software-manager-setup
          path: installer/software-manager-setup.exe

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: software-manager-portable

      - uses: actions/download-artifact@v4
        with:
          name: software-manager-setup

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            software-manager.exe
            software-manager-setup.exe
          generate_release_notes: true
